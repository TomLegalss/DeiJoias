<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TBLOX</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  background: linear-gradient(135deg, #001a33, #000000);
  color: white;
  overflow: hidden;
}

.logo {
  position: absolute;
  top: 20px;
  left: 25px;
  font-size: 28px;
  font-weight: bold;
  letter-spacing: 1px;
}

.container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
}

.btn {
  padding: 16px 32px;
  font-size: 18px;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  color: white;
  background: linear-gradient(135deg, #0066ff, #000000);
  transition: 0.2s;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.btn:hover {
  animation: bounce 0.4s ease;
  box-shadow: 0 0 15px #0066ff;
}

@keyframes bounce {
  0%   { transform: translateY(0); }
  30%  { transform: translateY(-10px); }
  60%  { transform: translateY(0); }
  100% { transform: translateY(-5px); }
}
</style>
</head>
<body>

<div class="logo">TBLOX</div>

<div class="container">
  <button class="btn">Roube um Brainrot</button>

  <a href="trocas.html" class="btn">Trocas</a>
</div>

</body>
</html>
