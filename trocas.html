<!DOCTYPE html> <html lang="pt-br"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Trocas - TBLOX</title> <style> * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; } body { background: linear-gradient(135deg, #001a33, #000000); color: white; min-height: 100vh; padding: 30px; } .topo { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; } .logo { font-size: 28px; font-weight: bold; } .botoes-topo button { margin-left: 10px; padding: 12px 22px; border: none; border-radius: 12px; cursor: pointer; background: linear-gradient(135deg, #0066ff, #000000); color: white; font-size: 15px; } .card { background: rgba(255,255,255,0.08); padding: 25px; border-radius: 18px; margin-bottom: 20px; } a { color: white; text-decoration: none; } .chat-btn { display: inline-block; margin-top: 15px; padding: 14px 26px; border-radius: 12px; background: linear-gradient(135deg, #0066ff, #000000); } /* Popup */ .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; } .modal-box { background: #0b1c2c; padding: 30px; border-radius: 18px; width: 320px; } .modal-box h2 { margin-bottom: 20px; } input { width: 100%; padding: 12px; margin-bottom: 15px; border: none; border-radius: 10px; } .modal-box button { width: 100%; } </style> </head> <body> <div class="topo"> <div class="logo">TBLOX</div> <div class="botoes-topo"> <button onclick="abrirLogin()">Login</button> <button onclick="abrirCadastro()">Cadastrar-se</button> </div> </div> <div class="card"> <h2>💬 Criar chat para falar com o ADM</h2> <p>Abra sua conversa privada e fale diretamente com o administrador.</p> <a href="CHAT.HTML" class="chat-btn"> Abrir Chat </a> </div> <!-- LOGIN --> <div class="modal" id="loginModal"> <div class="modal-box"> <h2>Login ADM</h2> <input type="text" id="loginUser" placeholder="Usuário"> <input type="password" id="loginSenha" placeholder="Senha"> <button onclick="fazerLogin()">Entrar</button> </div> </div> <!-- CADASTRO --> <div class="modal" id="cadastroModal"> <div class="modal-box"> <h2>Cadastrar-se</h2> <input type="email" placeholder="Seu e-mail"> <input type="password" placeholder="Sua senha"> <button onclick="fecharCadastro()">Cadastrar</button> </div> </div> <script> function abrirLogin() { document.getElementById("loginModal").style.display = "flex"; } function abrirCadastro() { document.getElementById("cadastroModal").style.display = "flex"; } function fecharCadastro() { alert("Cadastro realizado com sucesso!"); document.getElementById("cadastroModal").style.display = "none"; } function fazerLogin() { const user = document.getElementById("loginUser").value; const senha = document.getElementById("loginSenha").value; if (user === "adm" && senha === "adm") { alert("Login ADM realizado com sucesso!"); document.getElementById("loginModal").style.display = "none"; } else { alert("Login inválido"); } } window.onclick = function(event) { const login = document.getElementById("loginModal"); const cadastro = document.getElementById("cadastroModal"); if (event.target === login) { login.style.display = "none"; } if (event.target === cadastro) { cadastro.style.display = "none"; } } </script> </body> </html>
